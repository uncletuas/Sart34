# Render blueprint for Sart34 — managed Postgres, NestJS API, static React app.
# Deploy: Render Dashboard → New → Blueprint → pick this repo.

databases:
  - name: sart34-db
    databaseName: sart34
    user: sart34
    plan: free
    region: oregon

services:
  # ---- Backend API (NestJS) ----
  - type: web
    name: sart34-api
    runtime: node
    plan: free
    region: oregon
    healthCheckPath: /docs
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && (npx ts-node prisma/seed.ts || echo "seed skipped") && node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PREFIX
        value: api/v1
      - key: DATABASE_URL
        fromDatabase:
          name: sart34-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: DISABLE_QUEUES
        value: "true"
      - key: UPLOAD_ROOT
        value: uploads
      # After the first deploy, confirm these match the real service URLs.
      - key: PUBLIC_BASE_URL
        value: https://sart34-api.onrender.com
      - key: APP_BASE_URL
        value: https://sart34-web.onrender.com
      - key: SART34_ADMIN_EMAIL
        value: admin@sart34.app
      - key: SART34_ADMIN_PASSWORD
        generateValue: true
      # Optional integrations — set in the dashboard when you have them.
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_WEBHOOK_SECRET
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_REDIRECT_URI
        value: https://sart34-api.onrender.com/api/v1/integrations/meta/callback
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_DEVELOPER_TOKEN
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://sart34-api.onrender.com/api/v1/integrations/google/callback
      - key: TIKTOK_APP_ID
        sync: false
      - key: TIKTOK_APP_SECRET
        sync: false
      - key: TIKTOK_REDIRECT_URI
        value: https://sart34-api.onrender.com/api/v1/integrations/tiktok/callback
      - key: WHATSAPP_APP_ID
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: WHATSAPP_REDIRECT_URI
        value: https://sart34-api.onrender.com/api/v1/integrations/whatsapp/callback
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_BUSINESS_ACCOUNT_ID
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: LINKEDIN_REDIRECT_URI
        value: https://sart34-api.onrender.com/api/v1/integrations/linkedin/callback
      - key: X_CLIENT_ID
        sync: false
      - key: X_CLIENT_SECRET
        sync: false
      - key: X_REDIRECT_URI
        value: https://sart34-api.onrender.com/api/v1/integrations/x/callback

  # ---- Frontend (static React app) ----
  - type: web
    name: sart34-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://sart34-api.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
